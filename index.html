<!DOCTYPE html>
<html>
  <head>
    <title>Характеристики тракторів</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
<div id="header"></div>
<script>
fetch('header.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('header').innerHTML = data;
  });
</script>
  <body>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #333;
    }

    header {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.15);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card a {
      text-decoration: none;
      color: inherit;
      display: block;
      padding: 15px;
      font-weight: bold;
      font-size: 16px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>
<body>


  
  <p>Оберіть категорію</p>


<div class="container">
  <div class="grid">

    <div class="card">
      <a href="https://sergobx.github.io/dovidnyk_emto/tractors/">
        <img src="images/tractors.jpg" alt="Трактори">
        Характеристики тракторів
      </a>
    </div>

    <div class="card">
      <a href="https://sergobx.github.io/dovidnyk_emto/sgm/">
        <img src="images/sgm.jpg" alt="Сільськогосподарські машини">
        Характеристики сільськогосподарських машин
      </a>
    </div>

    <div class="card">
      <a href="https://sergobx.github.io/dovidnyk_emto/cars/">
        <img src="images/cars.jpg" alt="Автомобілі">
        Характеристики автомобілів
      </a>
    </div>

    <div class="card">
      <a href="https://sergobx.github.io/dovidnyk_emto/vlastyvosti/">
        <img src="images/mta.jpg" alt="Розрахунок МТА">
        Розрахунок МТА
      </a>
    </div>

    <div class="card">
      <a href="https://sergobx.github.io/dovidnyk_emto/materials/">
        <img src="images/materials.jpg" alt="Матеріали">
        Характеристики матеріалів
      </a>
    </div>

    <div class="card">
      <a href="https://sergobx.github.io/dovidnyk_emto/ekonom/">
        <img src="images/econom.jpg" alt="Економіка">
        Економічна частина
      </a>
    </div>

  </div>
</div>

  </body>
</html>
